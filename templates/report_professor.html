{% extends 'professor_dashboard.html' %}
{% block body %}

<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">

      <div class="card border-0 shadow-sm mt-4">
        <div class="card-body p-4">

          <!-- Title -->
          <h4 class="text-center font-weight-bold mb-3">
            <i class="fas fa-bug mr-2 text-danger"></i> Report Problems
          </h4>

          <!-- Bug Image -->
          <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='report_bug.png') }}"
                 alt="Report Bug"
                 style="max-width: 160px; width: 100%; height: auto;">
          </div>

          <!-- Form -->
          <form action="/report_professor_email" method="POST">

            <div class="form-group">
              <label class="font-weight-500" for="prob_type">Problem Category</label>
              <select class="custom-select" id="prob_type" name="prob_type" required>
                <option value="" disabled selected>-- Select a category --</option>
                <option value="Login/Register/Face Verification">Login / Register / Face Verification</option>
                <option value="Exam/Create/View/Update/Delete">Exam / Create / View / Update / Delete</option>
                <option value="Student Monitoring">Student Monitoring</option>
                <option value="Insert Marks/Publish Results">Insert Marks / Publish Results</option>
                <option value="Payment">Payment</option>
                <option value="Others">Others</option>
              </select>
            </div>

            <div class="form-group">
              <label class="font-weight-500" for="rquery">Your Message</label>
              <textarea name="rquery" id="rquery" class="form-control"
                        placeholder="Describe your problem or suggestion..."
                        rows="5" required></textarea>
            </div>

            <div class="text-center mt-3">
              <button type="submit" class="btn btn-danger px-5">
                <i class="fas fa-paper-plane mr-2"></i> Submit Report
              </button>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>

{% endblock %}
