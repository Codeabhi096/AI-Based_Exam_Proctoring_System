{% extends 'professor_dashboard.html' %}
{% block body %}

<div class="row justify-content-center mt-4">
  <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">

    <div class="card border-0 shadow-sm rounded-lg">
      <div class="card-body p-4">

        <!-- Title -->
        <h4 class="text-center font-weight-bold mb-3">
          <i class="fas fa-key mr-2 text-primary"></i> Change Password
        </h4>

        <!-- Image -->
        <div class="text-center mb-4">
          <img src="static/authentication_cp.png" alt="Change Password"
               style="max-width: 160px; width: 100%; height: auto;">
        </div>

        <!-- Form -->
        <form action="" method="POST">

          <div class="form-group">
            <label class="font-weight-600" for="oldpassword">Old Password</label>
            <div class="input-group">
              <div class="input-group-prepend">
                <span class="input-group-text">
                  <i class="fas fa-lock"></i>
                </span>
              </div>
              <input name="oldpassword" id="oldpassword" type="password"
                     class="form-control" placeholder="Enter old password" required>
            </div>
          </div>

          <div class="form-group">
            <label class="font-weight-600" for="newpassword">New Password</label>
            <div class="input-group">
              <div class="input-group-prepend">
                <span class="input-group-text">
                  <i class="fas fa-unlock-alt"></i>
                </span>
              </div>
              <input name="newpassword" id="newpassword" type="password"
                     class="form-control" placeholder="Enter new password" required>
            </div>
          </div>

          <div class="mt-4">
            <button type="submit" class="btn btn-primary btn-block"
                    style="padding:11px; font-size:0.95rem; font-weight:600; border-radius:8px;">
              <i class="fas fa-check mr-2"></i> Change Password
            </button>
          </div>

        </form>

      </div>
    </div>

  </div>
</div>

{% endblock %}
